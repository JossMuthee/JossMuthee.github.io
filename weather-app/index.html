<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Josphine Muthee</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1><i class="fas fa-cloud-sun"></i> Weather Forecast</h1>
            <p class="subtitle">Real-time weather for any city</p>
        </header>

        <main>
            <div class="search-section">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="city-input" 
                        placeholder="Enter city name (e.g., Nairobi, London, Tokyo)"
                        autocomplete="off"
                    >
                    <button id="search-btn">
                        <i class="fas fa-search"></i>
                        <span>Search</span>
                    </button>
                </div>
                <div class="popular-cities">
                    <button class="city-chip" data-city="Nairobi">Nairobi</button>
                    <button class="city-chip" data-city="Mombasa">Mombasa</button>
                    <button class="city-chip" data-city="Kisumu">Kisumu</button>
                    <button class="city-chip" data-city="London">London</button>
                    <button class="city-chip" data-city="New York">New York</button>
                </div>
            </div>

            <div id="weather-info" class="weather-info">
                <div class="welcome-message">
                    <i class="fas fa-map-marker-alt"></i>
                    <h3>Search for a city</h3>
                    <p>Enter a city name above to see current weather</p>
                </div>
            </div>

            <div id="error-message" class="error-message"></div>
        </main>

        <footer>
            <p>Data provided by OpenWeatherMap</p>
            <p class="last-updated">Last updated: <span id="last-updated"></span></p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
